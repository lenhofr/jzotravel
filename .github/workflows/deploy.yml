name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  pull-requests: write

concurrency:
  group: deploy
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_TERRAFORM_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.0

      - name: Terraform init
        working-directory: terraform
        run: terraform init -input=false

      - name: Terraform apply
        id: tfapply
        working-directory: terraform
        run: |
          set -o pipefail
          terraform apply -input=false -auto-approve 2>&1 | tee tfapply.log
          exit_code=${PIPESTATUS[0]}
          echo "apply_status=$([ $exit_code -eq 0 ] && echo success || echo failure)" >> $GITHUB_OUTPUT
          echo "tf_summary<<EOF" >> $GITHUB_OUTPUT
          tail -n 100 tfapply.log >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          exit $exit_code

      - name: Get Terraform outputs
        id: tfout
        working-directory: terraform
        run: |
          echo "site_bucket=$(terraform output -raw site_bucket)" >> $GITHUB_OUTPUT
          echo "distribution_id=$(terraform output -raw cloudfront_distribution_id)" >> $GITHUB_OUTPUT

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build
        run: npm run build

      - name: Configure AWS credentials (deploy role)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync to S3
        run: aws s3 sync dist/ s3://${{ steps.tfout.outputs.site_bucket }}/ --delete

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ steps.tfout.outputs.distribution_id }} \
            --paths "/*"

      - name: Comment apply result on associated PR
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const prs = await github.rest.repos.listPullRequestsAssociatedWithCommit({
              owner, repo, commit_sha: context.sha
            });
            if (!prs.data.length) return;
            const pr = prs.data.find(p => p.merged_at) || prs.data[0];
            const status = '${{ steps.tfapply.outputs.apply_status }}';
            const summary = `${{ steps.tfapply.outputs.tf_summary }}`;
            const icon = status === 'success' ? '✅' : '❌';
            const body = `<!-- terraform-apply -->\n<details>\n<summary><strong>Terraform apply ${icon}</strong></summary>\n\n\`\`\`\n${summary}\n\`\`\`\n</details>`;
            const comments = await github.paginate(github.rest.issues.listComments, { owner, repo, issue_number: pr.number, per_page: 100 });
            const existing = comments.find(c => (c.body || '').includes('<!-- terraform-apply -->'));
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number: pr.number, body });
            }
